<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-IoT by YB & HS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Using Inter font as default */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Custom styling for video container */
        .video-container {
            position: relative;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 90%;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Styling for video element */
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent;
        }

        /* Custom controls overlay */
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.9));
            padding: 20px 16px 16px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .video-container:hover .video-controls {
            transform: translateY(0);
        }

        /* Progress bar styling */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: #3b82f6;
            border-radius: 3px;
            transition: width 0.1s ease;
        }

        /* When the stream is live-only (WebRTC), the progress bar isn't seekable. */
        .progress-container.live-only {
            cursor: default;
        }
        .progress-container.live-only .progress-bar {
            background: #ef4444;
        }

        /* Volume slider */
        .volume-slider {
            width: 0;
            opacity: 0;
            transition: all 0.3s ease;
            margin-left: 8px;
        }

        .volume-container:hover .volume-slider {
            width: 80px;
            opacity: 1;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .video-container {
                width: 95%;
                height: 70vh;
            }

            .mobile-controls {
                display: flex;
                gap: 8px;
            }

            .desktop-controls {
                display: none;
            }
        }

        @media (min-width: 769px) {
            .mobile-controls {
                display: none;
            }

            .desktop-controls {
                display: flex;
                gap: 12px;
            }
        }

        /* Loading spinner */
        .loading-spinner {
            border: 3px solid rgba(0, 0, 0, 0.2);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Styling for active protocol button */
        .protocol-btn.active {
            background-color: #3b82f6 !important;
            color: white !important;
        }
    </style>
</head>

<body class="text-gray-800">

    <div class="flex flex-col h-screen">
        <header class="bg-white p-3 md:p-4 border-b border-gray-200 shadow-sm flex-shrink-0">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4 max-w-7xl mx-auto">

                <div class="flex-grow w-full md:w-auto">
                    <input type="text" id="pathInput" placeholder="Enter stream path..."
                        class="w-full bg-gray-100 text-gray-800 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all">
                </div>

                <div id="protocolSelector" class="flex items-center gap-2 p-1 bg-gray-200 rounded-lg">
                    <button data-protocol="hls"
                        class="protocol-btn bg-blue-500 text-white px-4 py-1 rounded-md text-sm font-medium active">LL-HLS</button>
                    <button data-protocol="webrtc"
                        class="protocol-btn text-gray-600 hover:bg-gray-300 px-4 py-1 rounded-md text-sm font-medium">WebRTC</button>
                </div>

                <div class="flex items-center gap-4 w-full md:w-auto justify-end">
                    <div id="statusLog" class="flex-grow text-sm text-gray-500 truncate hidden md:block text-right">
                        Waiting for input...</div>
                    <button onclick="loadStream()"
                        class="w-full md:w-auto bg-blue-600 text-white font-semibold px-6 py-2 rounded-lg hover:bg-blue-700 transition-all shadow-md">
                        Load
                    </button>
                </div>

            </div>
        </header>

        <main class="flex-grow flex items-center justify-center p-4 md:p-6 overflow-hidden">
            <div class="video-container">
                <video id="videoPlayer" playsinline></video>

                <div id="loadingIndicator"
                    class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-75 hidden">
                    <div class="flex flex-col items-center">
                        <div class="loading-spinner mb-4"></div>
                        <p class="text-gray-700 text-sm">Loading stream...</p>
                    </div>
                </div>

                <div class="video-controls">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <button id="playPauseBtn"
                                class="text-gray-700 hover:text-blue-500 transition-colors p-2 bg-gray-100 bg-opacity-50 rounded-full hover:bg-opacity-70">
                                <svg id="playIcon" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                                <svg id="pauseIcon" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                                </svg>
                            </button>

                            <div class="volume-container flex items-center ml-2">
                                <button id="muteBtn" class="text-gray-700 hover:text-blue-500 transition-colors p-2">
                                    <svg id="volumeIcon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd"
                                            d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.617.794L4.15 13.5H2a1 1 0 01-1-1v-5a1 1 0 011-1h2.15l4.233-3.294a1 1 0 011.617.794zM12 6a1 1 0 011.414 0 5 5 0 010 7.071A1 1 0 0112 12a3 3 0 000-4.243A1 1 0 0112 6z"
                                            clip-rule="evenodd"></path>
                                    </svg>
                                    <svg id="mutedIcon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd"
                                            d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.617.794L4.15 13.5H2a1 1 0 01-1-1v-5a1 1 0 011-1h2.15l4.233-3.294a1 1 0 011.617.794zM12.293 7.293a1 1 0 011.414 0L15 8.586l1.293-1.293a1 1 0 111.414 1.414L16.414 10l1.293 1.293a1 1 0 01-1.414 1.414L15 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L13.586 10l-1.293-1.293a1 1 0 010-1.414z"
                                            clip-rule="evenodd"></path>
                                    </svg>
                                </button>
                                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.1"
                                    value="1">
                            </div>

                            <span id="timeDisplay" class="text-sm text-gray-600 ml-4">00:00 / 00:00</span>
                        </div>

                        <div class="flex items-center gap-2">
                            <select id="qualitySelector"
                                class="bg-gray-200 text-gray-800 text-sm px-2 py-1 rounded border-gray-300 hidden">
                                <option>Auto</option>
                            </select>

                            <button id="fullscreenBtn" class="text-gray-700 hover:text-blue-500 transition-colors p-2">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd"
                                        d="M3 4a1 1 0 011-1h4a1 1 0 010 2H6.414l2.293 2.293a1 1 0 11-1.414 1.414L5 6.414V8a1 1 0 01-2 0V4zm9 1a1 1 0 010-2h4a1 1 0 011 1v4a1 1 0 01-2 0V6.414l-2.293 2.293a1 1 0 11-1.414-1.414L13.586 5H12zm-9 7a1 1 0 012 0v1.586l2.293-2.293a1 1 0 111.414 1.414L6.414 15H8a1 1 0 010 2H4a1 1 0 01-1-1v-4zm13-1a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 010-2h1.586l-2.293-2.293a1 1 0 111.414-1.414L15 13.586V12a1 1 0 011-1z"
                                        clip-rule="evenodd"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="videoOverlay"
                    class="absolute inset-0 flex flex-col items-center justify-center text-gray-800 bg-white bg-opacity-60 transition-opacity duration-500">
                    <div id="overlayContent" class="flex flex-col items-center">
                        <svg class="w-16 h-16 mb-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
                            </path>
                        </svg>
                        <p class="text-gray-600 mt-2 text-lg text-center">Video stream will appear here</p>
                        <p class="text-gray-500 mt-1 text-sm text-center">Enter a stream path and click Load</p>
                    </div>

                    <div id="hoverPlayButton" class="hidden">
                        <button
                            class="bg-blue-600 hover:bg-blue-700 text-white rounded-full p-4 transition-all shadow-lg">
                            <svg class="w-12 h-12" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                                    clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Global variables to store player instances
        let activeHlsPlayer = null;
        let activeWebRtcPeerConnection = null;
        let selectedProtocol = 'hls';
        let isPlaying = false;
        let currentTime = 0;
        let duration = 0;
        let isStreamLoaded = false;
        let isLoading = false;
        let isScrubbing = false;

        // Element references
        const pathInput = document.getElementById('pathInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const statusLog = document.getElementById('statusLog');
        const protocolButtons = document.querySelectorAll('.protocol-btn');
        const videoOverlay = document.getElementById('videoOverlay');
        const overlayContent = document.getElementById('overlayContent');
        const hoverPlayButton = document.getElementById('hoverPlayButton');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const videoContainer = document.querySelector('.video-container');

        // Control elements
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const mutedIcon = document.getElementById('mutedIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Function to log messages
        function log(message) {
            console.log(message);
            statusLog.textContent = message;
        }

        // Function to format time
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = Math.floor(seconds % 60);
            return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        // Function to update the progress bar.
        // - WebRTC is a live MediaStream with no meaningful DVR window — show LIVE.
        // - For LL-HLS, use videoPlayer.seekable (duration is Infinity for live).
        // - While the user is scrubbing, do not fight them with timeupdate paints.
        function updateProgress() {
            if (isScrubbing) return;
            if (selectedProtocol === 'webrtc' || videoPlayer.srcObject) {
                progressBar.style.width = '100%';
                timeDisplay.textContent = 'LIVE';
                return;
            }
            const sk = videoPlayer.seekable;
            if (!sk || sk.length === 0) return;
            const start = sk.start(0);
            const end = sk.end(sk.length - 1);
            const span = end - start;
            if (span <= 0) return;
            const progress = ((videoPlayer.currentTime - start) / span) * 100;
            progressBar.style.width = Math.max(0, Math.min(100, progress)) + '%';
            timeDisplay.textContent =
                `${formatTime(Math.max(0, videoPlayer.currentTime - start))} / ${formatTime(span)}`;
        }

        // Function to update overlay visibility based on state
        function updateOverlayVisibility() {
            if (isLoading) {
                // When loading: hide overlay text, show loading indicator
                videoOverlay.style.opacity = '1';
                overlayContent.style.display = 'none';
                hoverPlayButton.classList.add('hidden');
            } else if (isStreamLoaded) {
                // When stream is loaded: hide all overlays
                videoOverlay.style.opacity = '0';
            } else {
                // Default: show instruction text
                videoOverlay.style.opacity = '1';
                overlayContent.style.display = 'flex';
                hoverPlayButton.classList.add('hidden');
            }
        }

        // Function to clean up all players.
        // Note: we must NOT assign videoPlayer.src = "" — that triggers a
        // spurious 'error' event on the <video> element. Use removeAttribute
        // + load() which resets the element cleanly with no error.
        function cleanupPlayers() {
            log("Cleaning up previous player...");
            if (activeHlsPlayer) {
                activeHlsPlayer.destroy();
                activeHlsPlayer = null;
            }
            if (activeWebRtcPeerConnection) {
                activeWebRtcPeerConnection.close();
                activeWebRtcPeerConnection = null;
            }
            try { videoPlayer.pause(); } catch (e) { }
            videoPlayer.removeAttribute('src');
            videoPlayer.srcObject = null;
            videoPlayer.load();
            isPlaying = false;
            isStreamLoaded = false;
            isLoading = false;
            loadingIndicator.classList.add('hidden');
            updatePlayPauseButton();
            updateOverlayVisibility();
        }

        // Function to handle hover effects
        function handleHoverEffects() {
            const isHovering = videoContainer.matches(':hover');

            if (!isLoading && !isStreamLoaded && isHovering) {
                // If hovering and no stream is loaded, show the play button
                overlayContent.style.display = 'none';
                hoverPlayButton.classList.remove('hidden');
            } else if (!isLoading && !isStreamLoaded) {
                // Default: show instruction text
                overlayContent.style.display = 'flex';
                hoverPlayButton.classList.add('hidden');
            }
        }

        // Function to update the play/pause button
        function updatePlayPauseButton() {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        // Event listeners for video controls
        playPauseBtn.addEventListener('click', () => {
            if (videoPlayer.paused) {
                videoPlayer.play();
            } else {
                videoPlayer.pause();
            }
        });

        muteBtn.addEventListener('click', () => {
            videoPlayer.muted = !videoPlayer.muted;
            volumeIcon.classList.toggle('hidden', videoPlayer.muted);
            mutedIcon.classList.toggle('hidden', !videoPlayer.muted);
        });

        volumeSlider.addEventListener('input', (e) => {
            videoPlayer.volume = e.target.value;
            videoPlayer.muted = e.target.value == 0;
            volumeIcon.classList.toggle('hidden', videoPlayer.muted);
            mutedIcon.classList.toggle('hidden', !videoPlayer.muted);
        });

        // Drag-to-scrub support for the LL-HLS DVR window.
        // Disabled for WebRTC since it has no real DVR window.
        function getClientX(e) {
            if (e.touches && e.touches.length) return e.touches[0].clientX;
            if (e.changedTouches && e.changedTouches.length) return e.changedTouches[0].clientX;
            return e.clientX;
        }

        function seekFromEvent(e) {
            const sk = videoPlayer.seekable;
            if (!sk || sk.length === 0) return;
            const start = sk.start(0);
            const end = sk.end(sk.length - 1);
            if (end <= start) return;
            const rect = progressContainer.getBoundingClientRect();
            let ratio = (getClientX(e) - rect.left) / rect.width;
            ratio = Math.max(0, Math.min(1, ratio));
            const target = start + ratio * (end - start);
            // Repaint the bar live so the user gets visual feedback while dragging.
            progressBar.style.width = (ratio * 100) + '%';
            timeDisplay.textContent =
                `${formatTime(target - start)} / ${formatTime(end - start)}`;
            videoPlayer.currentTime = target;
        }

        function isScrubAllowed() {
            // No scrubbing on live WebRTC, and not before a stream is loaded.
            if (selectedProtocol === 'webrtc' || videoPlayer.srcObject) return false;
            if (!isStreamLoaded) return false;
            const sk = videoPlayer.seekable;
            return !!(sk && sk.length && sk.end(sk.length - 1) > sk.start(0));
        }

        progressContainer.addEventListener('mousedown', (e) => {
            if (!isScrubAllowed()) return;
            isScrubbing = true;
            seekFromEvent(e);
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isScrubbing) return;
            seekFromEvent(e);
        });

        document.addEventListener('mouseup', (e) => {
            if (!isScrubbing) return;
            seekFromEvent(e);
            isScrubbing = false;
        });

        // Touch equivalents for mobile.
        progressContainer.addEventListener('touchstart', (e) => {
            if (!isScrubAllowed()) return;
            isScrubbing = true;
            seekFromEvent(e);
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isScrubbing) return;
            seekFromEvent(e);
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!isScrubbing) return;
            seekFromEvent(e);
            isScrubbing = false;
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                videoPlayer.closest('.video-container').requestFullscreen();
            }
        });

        // Event listener for protocol buttons
        protocolButtons.forEach(button => {
            button.addEventListener('click', () => {
                // 1. Loop through all buttons to reset them to the inactive state
                protocolButtons.forEach(btn => {
                    btn.classList.remove('active', 'bg-blue-500', 'text-white');
                    btn.classList.add('text-gray-600', 'hover:bg-gray-300');
                });

                // 2. Activate the newly clicked button
                button.classList.add('active', 'bg-blue-500', 'text-white');
                button.classList.remove('text-gray-600', 'hover:bg-gray-300');

                selectedProtocol = button.dataset.protocol;
                log(`Protocol changed to: ${selectedProtocol.toUpperCase()}`);
                progressContainer.classList.toggle('live-only', selectedProtocol === 'webrtc');
            });
        });

        // Event listeners for the video player
        videoPlayer.addEventListener('loadstart', () => {
            isLoading = true;
            loadingIndicator.classList.remove('hidden');
            updateOverlayVisibility();
        });

        videoPlayer.addEventListener('loadeddata', () => {
            isLoading = false;
            isStreamLoaded = true;
            loadingIndicator.classList.add('hidden');
            updateOverlayVisibility();
        });

        videoPlayer.addEventListener('play', () => {
            isPlaying = true;
            updatePlayPauseButton();
        });

        videoPlayer.addEventListener('pause', () => {
            isPlaying = false;
            updatePlayPauseButton();
        });

        videoPlayer.addEventListener('timeupdate', updateProgress);

        videoPlayer.addEventListener('error', (e) => {
            // Ignore errors fired when the element was intentionally cleared
            // by cleanupPlayers() — nothing is attached, nothing to report.
            if (!videoPlayer.currentSrc && !videoPlayer.srcObject) return;
            const mediaErr = videoPlayer.error;
            const errorMsg = `Video error: ${mediaErr ? ('code ' + mediaErr.code + ' ' + (mediaErr.message || '')) : 'Unknown error'}`;
            log(errorMsg);
            alert(errorMsg);
            isLoading = false;
            isStreamLoaded = false;
            loadingIndicator.classList.add('hidden');
            updateOverlayVisibility();
        });

        // Mouse events for hover effect on the video container
        videoContainer.addEventListener('mouseenter', handleHoverEffects);
        videoContainer.addEventListener('mouseleave', handleHoverEffects);

        // Click event for the hover play button
        hoverPlayButton.addEventListener('click', loadStream);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            switch (e.code) {
                case 'Space':
                    e.preventDefault();
                    playPauseBtn.click();
                    break;
                case 'KeyM':
                    muteBtn.click();
                    break;
                case 'KeyF':
                    fullscreenBtn.click();
                    break;
                case 'ArrowLeft': {
                    const sk = videoPlayer.seekable;
                    const lo = (sk && sk.length) ? sk.start(0) : 0;
                    videoPlayer.currentTime = Math.max(lo, videoPlayer.currentTime - 10);
                    break;
                }
                case 'ArrowRight': {
                    const sk = videoPlayer.seekable;
                    const hi = (sk && sk.length) ? sk.end(sk.length - 1)
                        : (isFinite(videoPlayer.duration) ? videoPlayer.duration : videoPlayer.currentTime + 10);
                    videoPlayer.currentTime = Math.min(hi, videoPlayer.currentTime + 10);
                    break;
                }
            }
        });

        // Main function to load the stream
        function loadStream() {
            const path = pathInput.value.trim();
            if (!path) {
                alert("Stream path cannot be empty!");
                return;
            }

            cleanupPlayers();
            isLoading = true;
            loadingIndicator.classList.remove('hidden');
            updateOverlayVisibility();
            log(`Attempting to load stream "${path}" with protocol ${selectedProtocol.toUpperCase()}...`);

            switch (selectedProtocol) {
                case 'hls':
                    loadHls(path);
                    break;
                case 'webrtc':
                    loadWebRtc(path);
                    break;
                default:
                    log("Invalid protocol.");
            }
        }

        // Function to load HLS
        function loadHls(path) {
            const url = `/hls/${path}/index.m3u8`;
            if (Hls.isSupported()) {
                log(`Loading HLS from: ${url}`);
                // Enable real LL-HLS (partial segments) and a large back-buffer
                // so the user can rewind through the DVR window served by MediaMTX
                // (configured for ~5 minutes via hlsSegmentCount: 300).
                activeHlsPlayer = new Hls({
                    lowLatencyMode: true,
                    backBufferLength: 300,
                    liveSyncDurationCount: 3,
                    maxBufferLength: 30,
                });
                activeHlsPlayer.loadSource(url);
                activeHlsPlayer.attachMedia(videoPlayer);
                activeHlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        const errorMsg = `Fatal HLS error: ${data.details}\nPlease enter a correct path!`;
                        log(errorMsg);
                        alert(errorMsg);
                        isLoading = false;
                        isStreamLoaded = false;
                        loadingIndicator.classList.add('hidden');
                        updateOverlayVisibility();
                        cleanupPlayers();
                    }
                });
                activeHlsPlayer.on(Hls.Events.MANIFEST_LOADED, function () {
                    isLoading = false;
                    isStreamLoaded = true;
                    loadingIndicator.classList.add('hidden');
                    updateOverlayVisibility();
                    videoPlayer.play().catch(e => {
                        log("Autoplay was blocked by the browser, click play to start");
                    });
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                log(`Loading native HLS from: ${url}`);
                videoPlayer.src = url;
                videoPlayer.addEventListener('loadeddata', () => {
                    isLoading = false;
                    isStreamLoaded = true;
                    loadingIndicator.classList.add('hidden');
                    updateOverlayVisibility();
                }, { once: true });
                videoPlayer.addEventListener('error', () => {
                    const errorMsg = 'Error: Failed to load HLS stream';
                    log(errorMsg);
                    alert(errorMsg);
                    isLoading = false;
                    isStreamLoaded = false;
                    loadingIndicator.classList.add('hidden');
                    updateOverlayVisibility();
                    cleanupPlayers();
                }, { once: true });
                videoPlayer.play().catch(e => {
                    log("Autoplay was blocked by the browser, click play to start");
                });
            } else {
                const errorMsg = 'Browser does not support HLS';
                log(errorMsg);
                alert(errorMsg);
                isLoading = false;
                loadingIndicator.classList.add('hidden');
                updateOverlayVisibility();
            }
        }

        // Function to load WebRTC
        async function loadWebRtc(path) {
            const url = `/webrtc/${path}/whep`;
            log(`Starting WebRTC (WHEP) connection to: ${url}`);

            try {
                activeWebRtcPeerConnection = new RTCPeerConnection();

                activeWebRtcPeerConnection.ontrack = (event) => {
                    log("Video/audio track received.");
                    isLoading = false;
                    isStreamLoaded = true;
                    loadingIndicator.classList.add('hidden');
                    updateOverlayVisibility();
                    videoPlayer.srcObject = event.streams[0];
                    videoPlayer.play().catch(e => {
                        log("Autoplay was blocked by the browser, click play to start");
                    });
                };

                activeWebRtcPeerConnection.addTransceiver('video', { 'direction': 'recvonly' });
                activeWebRtcPeerConnection.addTransceiver('audio', { 'direction': 'recvonly' });

                const offer = await activeWebRtcPeerConnection.createOffer();
                await activeWebRtcPeerConnection.setLocalDescription(offer);

                log("Sending SDP offer to server...");
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/sdp' },
                    body: activeWebRtcPeerConnection.localDescription.sdp,
                });

                if (!response.ok) {
                    throw new Error(`Server response: ${response.status} ${response.statusText}`);
                }

                log("Received SDP answer from server...");
                const answerSdp = await response.text();
                await activeWebRtcPeerConnection.setRemoteDescription({
                    type: 'answer',
                    sdp: answerSdp,
                });
                log("WebRTC connection established successfully.");

            } catch (error) {
                const errorMsg = `WebRTC connection failed: ${error.message}`;
                log(errorMsg);
                alert(errorMsg);
                isLoading = false;
                isStreamLoaded = false;
                loadingIndicator.classList.add('hidden');
                updateOverlayVisibility();
                cleanupPlayers();
            }
        }

        // Enter key to load stream
        pathInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadStream();
            }
        });
    </script>
